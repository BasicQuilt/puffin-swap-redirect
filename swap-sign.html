<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puffin Swap — Sign Transaction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 20px;
            padding: 36px 28px;
            max-width: 460px;
            width: 100%;
            text-align: center;
        }

        .logo { font-size: 52px; margin-bottom: 12px; }

        h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }

        .summary {
            background: #12122a;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .summary-title { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .summary-item { font-size: 14px; color: #ccc; padding: 3px 0; }
        .summary-item span { color: #fff; font-weight: 500; }

        .address-box {
            background: #0d0d1f;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 10px 14px;
            font-family: monospace;
            font-size: 11px;
            color: #aaa;
            word-break: break-all;
            margin-bottom: 24px;
            text-align: left;
        }
        .address-label { font-size: 11px; color: #666; margin-bottom: 4px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover  { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .btn-pera  { background: #FFEE55; color: #1a1a00; }
        .btn-defly { background: #00C2FF; color: #001a22; }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0 16px;
            color: #444;
            font-size: 12px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid #2a2a4a;
        }

        #status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }
        .status-info    { background: #1a2a3a; border: 1px solid #2a4a6a; color: #6aadff; }
        .status-success { background: #0a2a0a; border: 1px solid #1a5a1a; color: #4aff4a; }
        .status-error   { background: #2a0a0a; border: 1px solid #5a1a1a; color: #ff6a6a; }

        .txid {
            background: #0d0d1f;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            margin-top: 10px;
            color: #aaa;
        }

        .return-btn {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            background: #5865F2;
            color: #fff;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-page { color: #ff6a6a; padding: 20px 0; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🐦</div>
    <h1>Puffin Swap</h1>
    <p class="subtitle">Sign your transaction group with Pera or Defly</p>

    <div id="main-content">
        <div class="summary" id="tx-summary">
            <div class="summary-title">You are sending</div>
            <div id="summary-items">Loading…</div>
        </div>

        <div id="address-section">
            <div class="address-label">Your registered address</div>
            <div class="address-box" id="user-address-display">—</div>
        </div>

        <button class="btn btn-pera"  id="btn-pera"  onclick="connectAndSign('pera')">
            🐦 Sign with Pera Wallet
        </button>
        <div class="divider">or</div>
        <button class="btn btn-defly" id="btn-defly" onclick="connectAndSign('defly')">
            🟢 Sign with Defly
        </button>
    </div>

    <div id="status"></div>
</div>

<!-- Pera Connect SDK -->
<script src="https://unpkg.com/@perawallet/connect@1.3.3/dist/index.umd.js"></script>
<!-- Defly Connect SDK -->
<script src="https://unpkg.com/@blockshake/defly-connect@1.1.3/dist/index.umd.js"></script>
<!-- algosdk browser build -->
<script src="https://unpkg.com/algosdk@2/dist/browser/algosdk.min.js"></script>

<script>
// ── Parse URL hash params ─────────────────────────────────────────────────────
const hashParams    = new URLSearchParams(window.location.hash.slice(1));
const txnsParam     = hashParams.get('txns');
const swapId        = hashParams.get('swapId') || '';
const userAddress   = hashParams.get('address') || '';
const ALGOD_SERVER  = 'https://mainnet-api.algonode.cloud';
const INDEXER_SERVER = 'https://mainnet-idx.algonode.cloud';

// ── Validate params ───────────────────────────────────────────────────────────
if (!txnsParam || !swapId) {
    document.getElementById('main-content').innerHTML =
        '<div class="error-page">⚠️ Invalid or missing transaction data.<br>Please return to Discord and try again.</div>';
} else {
    // Decode transactions
    const encodedTxns = txnsParam.split(',');

    // Show summary
    const summaryEl = document.getElementById('summary-items');
    summaryEl.innerHTML = encodedTxns.slice(0, -1).map((_, i) =>
        `<div class="summary-item">• <span>NFT ${i + 1}</span> — ASA transfer</div>`
    ).join('') +
    `<div class="summary-item">• <span>100 ALGO</span> — payment</div>`;

    // Show registered address
    if (userAddress) {
        document.getElementById('user-address-display').textContent = userAddress;
    } else {
        document.getElementById('address-section').style.display = 'none';
    }
}

// ── Status helpers ─────────────────────────────────────────────────────────────
function showStatus(type, html) {
    const el = document.getElementById('status');
    el.className = `status-${type}`;
    el.innerHTML = html;
    el.style.display = 'block';
}

function setButtonsDisabled(disabled) {
    document.getElementById('btn-pera').disabled  = disabled;
    document.getElementById('btn-defly').disabled = disabled;
}

// ── Decode + sign + submit ─────────────────────────────────────────────────────
async function connectAndSign(wallet) {
    if (!txnsParam) return;
    setButtonsDisabled(true);

    const encodedTxns = txnsParam.split(',');

    // Decode msgpack → algosdk Transaction objects
    const txns = encodedTxns.map(b64 => {
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        return algosdk.decodeUnsignedTransaction(bytes);
    });

    // Build signer transaction array (all signed by user)
    const signerTxns = txns.map(txn => ({ txn, signers: [txn.from.toString()] }));

    let connector, accounts;

    try {
        if (wallet === 'pera') {
            showStatus('info', '<div class="spinner"></div> Connecting to Pera Wallet…');
            const { PeraWalletConnect } = window.PeraWalletConnect || window['@perawallet/connect'];
            connector = new PeraWalletConnect();
            accounts  = await connector.connect();
        } else {
            showStatus('info', '<div class="spinner"></div> Connecting to Defly…');
            const { DeflyWalletConnect } = window.DeflyWalletConnect || window['@blockshake/defly-connect'];
            connector = new DeflyWalletConnect();
            accounts  = await connector.connect();
        }
    } catch (err) {
        setButtonsDisabled(false);
        showStatus('error', `❌ Wallet connection cancelled or failed.<br><small>${err.message}</small>`);
        return;
    }

    // Verify address matches registered address
    const connectedAddress = accounts[0];
    if (userAddress && connectedAddress !== userAddress) {
        await connector.disconnect().catch(() => {});
        setButtonsDisabled(false);
        showStatus('error',
            `⚠️ Wrong wallet connected.<br><br>` +
            `Your registered address:<br><code style="font-size:11px;word-break:break-all">${userAddress}</code><br><br>` +
            `Connected address:<br><code style="font-size:11px;word-break:break-all">${connectedAddress}</code><br><br>` +
            `Please connect the correct wallet and try again.`
        );
        return;
    }

    // Request signing
    let signedTxns;
    try {
        showStatus('info', '<div class="spinner"></div> Waiting for you to approve in your wallet…');
        signedTxns = await connector.signTransaction([signerTxns]);
    } catch (err) {
        await connector.disconnect().catch(() => {});
        setButtonsDisabled(false);
        showStatus('error', `❌ Transaction rejected or timed out.<br><small>${err.message}</small>`);
        return;
    }

    await connector.disconnect().catch(() => {});

    // Submit to Algorand
    showStatus('info', '<div class="spinner"></div> Submitting to the Algorand network…');

    try {
        const signedBytes = signedTxns.filter(Boolean).map(t =>
            t instanceof Uint8Array ? t : Uint8Array.from(atob(t), c => c.charCodeAt(0))
        );

        const resp = await fetch(`${ALGOD_SERVER}/v2/transactions`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/x-binary' },
            body:    new Blob(signedBytes),
        });

        if (!resp.ok) {
            const errText = await resp.text();
            throw new Error(errText);
        }

        const { txId } = await resp.json();

        // Wait for confirmation
        showStatus('info', '<div class="spinner"></div> Waiting for on-chain confirmation…');
        await waitForConfirmation(txId);

        showStatus('success',
            `✅ <strong>Transaction confirmed!</strong><br><br>` +
            `Swap ID: <strong>${swapId}</strong><br><br>` +
            `Return to Discord and click <strong>"I've signed and submitted"</strong> to receive your Tufted Puffin.` +
            `<div class="txid">TX: ${txId}</div>` +
            `<a class="return-btn" href="discord://">↩ Return to Discord</a>`
        );
    } catch (err) {
        setButtonsDisabled(false);
        showStatus('error', `❌ Submission failed: ${err.message}`);
    }
}

// ── Wait for confirmation via indexer ─────────────────────────────────────────
async function waitForConfirmation(txId, maxAttempts = 15) {
    for (let i = 0; i < maxAttempts; i++) {
        await new Promise(r => setTimeout(r, 2000));
        try {
            const resp = await fetch(`${INDEXER_SERVER}/v2/transactions/${txId}`);
            if (resp.ok) {
                const data = await resp.json();
                if (data.transaction?.['confirmed-round']) return data.transaction;
            }
        } catch {}
    }
    // Don't throw — the TX is likely confirmed, indexer may just be lagging
    console.warn('Confirmation polling timed out — TX may still be confirmed');
}
</script>
</body>
</html>
