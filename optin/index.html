<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puffin Swap — Opt In</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <script>var global = window;</script>
  <script src="vendor/vendor-bundle.js"></script>

  <style>
    :root {
      --bg:      #080b14; --surface: #0e1220; --border:  #1e2640;
      --border2: #2a3560; --text:    #c8d0e8; --muted:   #5a6480;
      --accent:  #4f8ef7; --success: #22c97a; --warn:    #f5a623;
      --mono:    'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--sans); background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: flex-start;
      justify-content: center; padding: 24px 16px 48px;
    }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image:
        linear-gradient(rgba(79,142,247,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .wrap { position:relative; z-index:1; width:100%; max-width:440px; }
    .header { text-align:center; padding:32px 0 24px; }
    .logo-ring {
      display:inline-flex; align-items:center; justify-content:center;
      width:64px; height:64px; border-radius:50%;
      border:1.5px solid var(--border2); background:var(--surface);
      font-size:32px; margin-bottom:14px;
      box-shadow:0 0 32px rgba(79,142,247,.12);
    }
    .header h1 { font-family:var(--mono); font-size:18px; font-weight:700; color:#fff; }
    .header p  { font-size:13px; color:var(--muted); margin-top:4px; }

    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:12px; }
    .card-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); }
    .card-title  { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
    .card-body   { padding:16px 18px; }

    /* ── NFT display ────────────────────────────────────────────────────────── */
    .nft-item {
      display:flex; align-items:center; gap:14px;
      padding:10px 0; border-bottom:1px solid var(--border);
    }
    .nft-item:last-child { border-bottom:none; padding-bottom:0; }
    .nft-item:first-child { padding-top:0; }

    .nft-img-wrap {
      width:64px; height:64px; border-radius:10px; flex-shrink:0;
      background:var(--border); overflow:hidden;
      border:1px solid var(--border2);
      display:flex; align-items:center; justify-content:center;
    }
    .nft-img-wrap img {
      width:100%; height:100%; object-fit:cover; display:block;
    }
    .nft-img-placeholder {
      font-size:26px; line-height:1;
    }

    /* Single large image when only one puffin */
    .nft-hero {
      width:100%; aspect-ratio:1/1; max-height:280px; border-radius:12px;
      overflow:hidden; background:var(--border);
      border:1px solid var(--border2); margin-bottom:14px;
      display:flex; align-items:center; justify-content:center;
    }
    .nft-hero img { width:100%; height:100%; object-fit:cover; display:block; }
    .nft-hero-placeholder { font-size:72px; }

    .nft-info { flex:1; min-width:0; }
    .nft-name { font-size:15px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .nft-asa  { font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:2px; }

    /* Single puffin card body */
    .single-nft-body { padding:16px 18px; }
    .single-nft-name { font-size:18px; font-weight:700; color:#fff; margin-bottom:4px; }
    .single-nft-asa  { font-family:var(--mono); font-size:11px; color:var(--muted); }

    /* ── Rest of UI ──────────────────────────────────────────────────────────── */
    .addr-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 16px; margin-bottom:12px; }
    .addr-label { font-size:10px; font-family:var(--mono); text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin-bottom:5px; }
    .addr-value { font-family:var(--mono); font-size:11px; color:#8899cc; word-break:break-all; line-height:1.5; }

    .action-section { padding:4px 18px 18px; display:flex; flex-direction:column; gap:8px; }
    .sign-btn {
      width:100%; padding:16px; border-radius:12px; border:none;
      font-family:var(--sans); font-size:15px; font-weight:600;
      background:var(--accent); color:#fff; cursor:pointer;
      box-shadow:0 4px 20px rgba(79,142,247,.3); transition:all .2s ease;
    }
    .sign-btn:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 28px rgba(79,142,247,.4); }
    .sign-btn:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; box-shadow:none; }
    .sign-btn.success { background:var(--success); box-shadow:0 4px 20px rgba(34,201,122,.3); }

    .wallet-row { display:flex; gap:8px; }
    .wallet-btn {
      flex:1; padding:11px; border-radius:10px; border:1px solid var(--border2);
      background:var(--bg); color:var(--text); font-family:var(--sans);
      font-size:13px; font-weight:500; cursor:pointer; transition:all .15s;
    }
    .wallet-btn:hover { border-color:var(--accent); color:var(--accent); }
    .wallet-btn.active { border-color:var(--success); color:var(--success); background:rgba(34,201,122,.06); }

    .status-box { padding:14px 18px; border-radius:12px; border:1px solid; font-size:13px; margin-bottom:12px; line-height:1.6; }
    .status-info    { background:rgba(79,142,247,.08); border-color:rgba(79,142,247,.3); color:#7fb3ff; }
    .status-success { background:rgba(34,201,122,.08); border-color:rgba(34,201,122,.3); color:var(--success); }
    .status-error   { background:rgba(255,80,80,.08);  border-color:rgba(255,80,80,.3);  color:#ff8080; }
    .status-warn    { background:rgba(245,166,35,.08); border-color:rgba(245,166,35,.3); color:var(--warn); }

    .step-indicator { display:flex; align-items:center; gap:8px; padding:16px 18px 14px; font-size:12px; color:var(--muted); font-family:var(--mono); }
    .step { display:flex; align-items:center; gap:4px; }
    .step-num { width:20px; height:20px; border-radius:50%; border:1px solid; display:flex; align-items:center; justify-content:center; font-size:10px; }
    .step.done .step-num   { border-color:var(--success); color:var(--success); }
    .step.active .step-num { border-color:var(--accent);  color:var(--accent);  }
    .step.pending .step-num { border-color:var(--muted); }
    .step-line { flex:1; height:1px; background:var(--border); }

    .help { text-align:center; font-size:12px; color:var(--muted); padding:8px 0 4px; line-height:1.7; }
    #main-content { display:none; }

    /* Loading shimmer for images */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .img-loading {
      background: linear-gradient(90deg, var(--border) 25%, var(--border2) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo-ring">🐦</div>
    <h1>Puffin Swap</h1>
    <p>One last step — opt in to receive your NFT</p>
  </div>

  <div id="status-box" class="status-box status-info">Loading…</div>

  <div id="main-content">

    <!-- Populated by JS depending on single vs multi asset -->
    <div id="nft-card" class="card">
      <div class="card-header"><span class="card-title" id="card-title">You Are Receiving</span></div>
      <div id="nft-card-body"></div>
    </div>

    <div class="addr-card">
      <div class="addr-label">Your address</div>
      <div class="addr-value" id="addr-display">—</div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Opt In</span></div>

      <div class="step-indicator">
        <div class="step active" id="step-connect">
          <div class="step-num">1</div>
          <span>Connect</span>
        </div>
        <div class="step-line"></div>
        <div class="step pending" id="step-sign">
          <div class="step-num">2</div>
          <span>Sign</span>
        </div>
        <div class="step-line"></div>
        <div class="step pending" id="step-done">
          <div class="step-num">3</div>
          <span>Done</span>
        </div>
      </div>

      <div class="action-section">
        <div class="wallet-row">
          <button class="wallet-btn" id="btn-pera"  onclick="connectWallet('pera')">🔵 Pera</button>
          <button class="wallet-btn" id="btn-defly" onclick="connectWallet('defly')">🟢 Defly</button>
        </div>
        <button class="sign-btn" id="sign-btn" disabled onclick="signOptIn()">
          Connect a wallet first
        </button>
      </div>
    </div>

    <p class="help" id="help-text">
      This is a zero-amount opt-in transaction.<br>
      It allows our bot to send your Tufted Puffin to you.<br>
      <br>
      After signing, return to Discord and tap<br>
      <strong>✅ I have opted in</strong>
    </p>

  </div>
</div>

<script>
  // ── Resolve wallet constructors ───────────────────────────────────────────
  function resolveConstructor(candidates) {
    for (var i = 0; i < candidates.length; i++) {
      var parts = candidates[i].split('.');
      var obj = window;
      for (var j = 0; j < parts.length; j++) {
        if (obj == null) { obj = null; break; }
        obj = obj[parts[j]];
      }
      if (typeof obj === 'function') return obj;
    }
    return null;
  }

  var PeraWalletConnect = resolveConstructor([
    'peraWalletConnect.PeraWalletConnect', 'PeraWalletConnect',
  ]);
  var DeflyWalletConnect = resolveConstructor([
    'deflyWalletConnect.DeflyWalletConnect', 'DeflyWalletConnect',
  ]);

  if (!PeraWalletConnect || !DeflyWalletConnect) {
    var sb = document.getElementById('status-box');
    sb.className     = 'status-box status-error';
    sb.innerHTML     = '⚠️ Wallet scripts failed to load.<br>Please hard-refresh (Ctrl+Shift+R) and try again.';
    sb.style.display = 'block';
  }

  const ALGOD_URL   = 'https://mainnet-api.algonode.cloud';
  const INDEXER_URL = 'https://mainnet-idx.algonode.cloud';
  const IPFS_GW     = 'https://ipfs.algonode.xyz/ipfs/';

  // Normalised list of assets to opt into — always an array internally
  let assets       = []; // [{ asaId: Number, asaName: String }]
  let userAddress  = '';
  let activeWallet = null;
  let walletType   = null;

  const peraWallet  = PeraWalletConnect  ? new PeraWalletConnect()  : null;
  const deflyWallet = DeflyWalletConnect ? new DeflyWalletConnect() : null;

  function showStatus(type, msg) {
    const el = document.getElementById('status-box');
    el.className     = 'status-box status-' + type;
    el.innerHTML     = msg;
    el.style.display = 'block';
  }

  function setStep(stepId, state) {
    document.getElementById(stepId).className = 'step ' + state;
  }

  // ── Image resolution ──────────────────────────────────────────────────────
  // Tries to get a usable image URL from an ASA via indexer + metadata fetch.
  // Returns null if nothing is found — the UI falls back to the 🐦 emoji.

  function toGatewayUrl(url) {
    if (!url) return null;
    url = url.trim().replace(/#arc\d+$/, '').replace(/\?.*$/, '');
    if (url.startsWith('ipfs://')) return IPFS_GW + url.slice(7);
    if (url.startsWith('https://') || url.startsWith('http://')) return url;
    // bare CID
    if (/^Qm[1-9A-Za-z]{44}/.test(url) || /^bafyb/i.test(url)) return IPFS_GW + url;
    return null;
  }

  async function fetchNftImage(asaId) {
    try {
      const res  = await fetch(INDEXER_URL + '/v2/assets/' + asaId);
      if (!res.ok) return null;
      const data = await res.json();
      const rawUrl = data.asset?.params?.url || '';

      const gatewayUrl = toGatewayUrl(rawUrl);
      if (!gatewayUrl) return null;

      // If it looks like a metadata JSON endpoint, fetch and pull image field
      const looksLikeJson =
        gatewayUrl.endsWith('.json') ||
        gatewayUrl.includes('/metadata') ||
        rawUrl.includes('#arc3') ||
        // IPFS URLs without an extension are usually metadata for ARC3
        (rawUrl.startsWith('ipfs://') && !rawUrl.match(/\.(png|jpg|jpeg|gif|webp|svg)$/i));

      if (looksLikeJson) {
        try {
          const metaRes = await fetch(gatewayUrl);
          if (metaRes.ok) {
            const meta = await metaRes.json();
            const imgRaw = meta.image || meta.image_url || meta.animation_url || '';
            const imgUrl = toGatewayUrl(imgRaw);
            if (imgUrl) return imgUrl;
          }
        } catch (_) { /* fall through to URL itself */ }
      }

      // If the URL itself looks like a direct image, use it
      if (gatewayUrl.match(/\.(png|jpg|jpeg|gif|webp|svg)(\?|$)/i)) return gatewayUrl;

      // Last resort — return the gateway URL and let the <img> decide
      return gatewayUrl;

    } catch (_) { return null; }
  }

  // ── NFT card rendering ────────────────────────────────────────────────────

  function makePlaceholderHtml(wrapClass) {
    return '<div class="' + wrapClass + ' img-loading"><span class="nft-img-placeholder">🐦</span></div>';
  }

  async function renderNftCard(assetList) {
    const single = assetList.length === 1;
    const body   = document.getElementById('nft-card-body');

    if (single) {
      // Hero layout: big image, then name + ASA below
      const a = assetList[0];
      body.innerHTML =
        '<div class="single-nft-body">' +
          '<div class="nft-hero img-loading" id="hero-wrap-0">' +
            '<span class="nft-hero-placeholder">🐦</span>' +
          '</div>' +
          '<div class="single-nft-name" id="nft-name-0">' + escHtml(a.asaName) + '</div>' +
          '<div class="single-nft-asa">ASA ' + a.asaId + '</div>' +
        '</div>';

      // Fetch image asynchronously — update hero once loaded
      fetchNftImage(a.asaId).then(function(imgUrl) {
        const wrap = document.getElementById('hero-wrap-0');
        if (!wrap) return;
        wrap.classList.remove('img-loading');
        if (imgUrl) {
          wrap.innerHTML = '<img src="' + imgUrl + '" alt="' + escHtml(a.asaName) + '" onerror="this.parentNode.innerHTML=\'<span class=nft-hero-placeholder>🐦</span>\'">';
        } else {
          wrap.innerHTML = '<span class="nft-hero-placeholder">🐦</span>';
        }
      });

    } else {
      // List layout: small thumbnail per puffin
      document.getElementById('card-title').textContent = 'You Are Receiving (' + assetList.length + ')';

      var rows = assetList.map(function(a, i) {
        return (
          '<div class="nft-item">' +
            '<div class="nft-img-wrap img-loading" id="thumb-wrap-' + i + '">' +
              '<span class="nft-img-placeholder">🐦</span>' +
            '</div>' +
            '<div class="nft-info">' +
              '<div class="nft-name">' + escHtml(a.asaName) + '</div>' +
              '<div class="nft-asa">ASA ' + a.asaId + '</div>' +
            '</div>' +
          '</div>'
        );
      }).join('');

      body.innerHTML = '<div class="card-body">' + rows + '</div>';

      // Fetch images for each in parallel
      assetList.forEach(function(a, i) {
        fetchNftImage(a.asaId).then(function(imgUrl) {
          var wrap = document.getElementById('thumb-wrap-' + i);
          if (!wrap) return;
          wrap.classList.remove('img-loading');
          if (imgUrl) {
            wrap.innerHTML = '<img src="' + imgUrl + '" alt="' + escHtml(a.asaName) + '" onerror="this.parentNode.innerHTML=\'<span class=nft-img-placeholder>🐦</span>\'">';
          } else {
            wrap.innerHTML = '<span class="nft-img-placeholder">🐦</span>';
          }
        });
      });
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Load gist ─────────────────────────────────────────────────────────────

  async function loadOptIn() {
    const params = new URLSearchParams(window.location.search);
    const gistId = params.get('gist');

    if (!gistId) {
      document.getElementById('status-box').style.display = 'none';
      document.getElementById('main-content').innerHTML =
        '<p style="text-align:center;padding:40px;color:var(--muted)">⚠️ Invalid opt-in link.<br>Please request a new one from Discord.</p>';
      document.getElementById('main-content').style.display = 'block';
      return;
    }

    try {
      const res = await fetch('https://api.github.com/gists/' + gistId, {
        headers: { 'Accept': 'application/vnd.github+json' },
      });
      if (!res.ok) throw new Error('Opt-in link not found or expired');

      const gist    = await res.json();
      const content = gist.files?.['optin.json']?.content;
      if (!content) throw new Error('Opt-in data missing from link');

      const data = JSON.parse(content);
      userAddress = data.addr;

      // ── Support both single and multi-asset gist formats ──────────────────
      // Single: { asaId, asaName, addr }
      // Multi:  { assets: [{ asaId, asaName }], addr }
      if (data.assets && Array.isArray(data.assets)) {
        assets = data.assets.map(function(a) {
          return { asaId: Number(a.asaId), asaName: a.asaName || 'Tufted Puffin' };
        });
      } else {
        assets = [{ asaId: Number(data.asaId), asaName: data.asaName || 'Tufted Puffin' }];
      }

      // Render NFT card with images
      await renderNftCard(assets);

      document.getElementById('addr-display').textContent = userAddress;

      // Update help text for multiple
      if (assets.length > 1) {
        document.getElementById('help-text').innerHTML =
          'These are zero-amount opt-in transactions — one per puffin.<br>' +
          'They are bundled into a single signing prompt.<br>' +
          '<br>' +
          'After signing, return to Discord and tap<br>' +
          '<strong>✅ I have opted in</strong>';
      }

      document.getElementById('status-box').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';

      // Auto-reconnect Pera session if it matches
      if (peraWallet) {
        peraWallet.reconnectSession()
          .then(function(accounts) {
            if (accounts.length && accounts[0].toLowerCase() === userAddress.toLowerCase()) {
              walletType   = 'pera';
              activeWallet = peraWallet;
              document.getElementById('btn-pera').classList.add('active');
              const signBtn = document.getElementById('sign-btn');
              signBtn.disabled    = false;
              signBtn.textContent = buildSignLabel('pera');
              setStep('step-connect', 'done');
              setStep('step-sign',    'active');
            }
          })
          .catch(function() {});
      }

    } catch (err) {
      showStatus('error', '⚠️ ' + err.message + '.<br><br>Please request a new link from Discord.');
    }
  }

  function buildSignLabel(walletName) {
    var count = assets.length;
    var label = count > 1
      ? 'Sign ' + count + ' Opt-Ins in '
      : 'Sign Opt-In in ';
    return label + (walletName === 'pera' ? 'Pera' : 'Defly');
  }

  // ── Wallet connect ────────────────────────────────────────────────────────

  async function connectWallet(type) {
    if (!peraWallet || !deflyWallet) {
      showStatus('error', '⚠️ Wallet scripts did not load. Please hard-refresh and try again.');
      return;
    }

    try {
      if (activeWallet && walletType !== type) {
        await activeWallet.disconnect().catch(function() {});
      }

      walletType   = type;
      activeWallet = type === 'pera' ? peraWallet : deflyWallet;

      const accounts  = await activeWallet.connect();
      const connected = accounts[0];

      if (connected.toLowerCase() !== userAddress.toLowerCase()) {
        showStatus('warn',
          '⚠️ Wrong address connected.<br>' +
          'Expected: <code style="font-size:10px">' + userAddress + '</code><br>' +
          'Got: <code style="font-size:10px">' + connected + '</code><br>' +
          'Please connect the correct wallet.'
        );
        await activeWallet.disconnect().catch(function() {});
        return;
      }

      document.getElementById('status-box').style.display = 'none';
      document.getElementById('btn-' + type).classList.add('active');
      document.getElementById(type === 'pera' ? 'btn-defly' : 'btn-pera').classList.remove('active');

      const signBtn = document.getElementById('sign-btn');
      signBtn.disabled    = false;
      signBtn.textContent = buildSignLabel(type);

      setStep('step-connect', 'done');
      setStep('step-sign',    'active');

    } catch (err) {
      if (err.message && !err.message.includes('cancelled') && !err.message.includes('closed')) {
        showStatus('error', 'Connection failed: ' + err.message);
      }
    }
  }

  // ── Sign opt-in(s) ────────────────────────────────────────────────────────
  // Builds one opt-in transaction per asset, groups them atomically so the
  // user only needs to approve once in their wallet.

  async function signOptIn() {
    if (!activeWallet || !assets.length) return;

    const signBtn = document.getElementById('sign-btn');
    signBtn.disabled    = true;
    signBtn.textContent = '⏳ Waiting for wallet approval…';
    document.getElementById('status-box').style.display = 'none';

    try {
      const algodClient     = new algosdk.Algodv2('', ALGOD_URL, 443);
      const suggestedParams = await algodClient.getTransactionParams().do();

      // Build one opt-in txn per asset
      const txns = assets.map(function(a) {
        return algosdk.makeAssetTransferTxnWithSuggestedParamsFromObject({
          from:            userAddress,
          to:              userAddress,
          amount:          0,
          assetIndex:      a.asaId,
          suggestedParams: suggestedParams,
        });
      });

      // Group atomically when more than one (single txn doesn't need a group ID)
      if (txns.length > 1) {
        algosdk.assignGroupID(txns);
      }

      const txnGroup = txns.map(function(txn) {
        return { txn: txn, signers: [userAddress] };
      });

      setStep('step-sign', 'active');

      const signedTxns = await activeWallet.signTransaction([txnGroup]);

      signBtn.textContent = '⏳ Submitting…';

      // sendRawTransaction accepts a flat Uint8Array array
      const { txId } = await algodClient.sendRawTransaction(signedTxns).do();
      await algosdk.waitForConfirmation(algodClient, txId, 6);

      setStep('step-sign', 'done');
      setStep('step-done', 'done');

      signBtn.classList.add('success');
      signBtn.textContent = '✅ Opted In — Return to Discord';
      signBtn.disabled    = false;
      signBtn.onclick     = null;

      showStatus('success',
        '✅ Opt-in confirmed on-chain!<br><br>' +
        'Go back to Discord and tap <strong>✅ I have opted in</strong> to receive your Tufted Puffin' +
        (assets.length > 1 ? 's' : '') + '.'
      );

    } catch (err) {
      setStep('step-sign', 'active');
      signBtn.disabled    = false;
      signBtn.textContent = 'Try Again';
      const msg = err.message || 'Unknown error';
      showStatus('error', '⚠️ ' + (msg.includes('cancelled') ? 'Signing was cancelled.' : msg));
    }
  }

  loadOptIn();
</script>
</body>
</html>
