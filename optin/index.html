<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puffin Swap — Opt In</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script>var global = window;</script>
  <script src="vendor/vendor-bundle.js"></script>
  <style>
    :root {
      --bg:#080b14;--surface:#0e1220;--border:#1e2640;--border2:#2a3560;
      --text:#c8d0e8;--muted:#5a6480;--accent:#4f8ef7;--success:#22c97a;--warn:#f5a623;
      --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 48px;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(79,142,247,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.04) 1px,transparent 1px);background-size:40px 40px;}
    .wrap{position:relative;z-index:1;width:100%;max-width:440px;}
    .header{text-align:center;padding:32px 0 24px;}
    .logo-ring{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface);font-size:32px;margin-bottom:14px;box-shadow:0 0 32px rgba(79,142,247,.12);}
    .header h1{font-family:var(--mono);font-size:18px;font-weight:700;color:#fff;}
    .header p{font-size:13px;color:var(--muted);margin-top:4px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;}
    .card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
    .card-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
    .single-nft-body{padding:16px 18px;}
    .nft-hero{width:100%;aspect-ratio:1/1;max-height:280px;border-radius:12px;background:var(--border);border:1px solid var(--border2);margin-bottom:14px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;overflow:hidden;}
    .nft-hero img{width:100%;height:100%;object-fit:cover;display:block;}
    .nft-hero-placeholder{font-size:72px;}
    .single-nft-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px;}
    .single-nft-asa{font-family:var(--mono);font-size:11px;color:var(--muted);}
    .debug-box{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.3);border-radius:8px;padding:10px 12px;margin:8px;font-family:var(--mono);font-size:10px;color:var(--warn);word-break:break-all;line-height:1.8;}
    .debug-box a{color:var(--accent);text-decoration:underline;}
    .addr-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:12px;}
    .addr-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px;}
    .addr-value{font-family:var(--mono);font-size:11px;color:#8899cc;word-break:break-all;line-height:1.5;}
    .action-section{padding:4px 18px 18px;display:flex;flex-direction:column;gap:8px;}
    .sign-btn{width:100%;padding:16px;border-radius:12px;border:none;font-family:var(--sans);font-size:15px;font-weight:600;background:var(--accent);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(79,142,247,.3);transition:all .2s ease;}
    .sign-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 28px rgba(79,142,247,.4);}
    .sign-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;box-shadow:none;}
    .sign-btn.success{background:var(--success);box-shadow:0 4px 20px rgba(34,201,122,.3);}
    .wallet-row{display:flex;gap:8px;}
    .wallet-btn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
    .wallet-btn:hover{border-color:var(--accent);color:var(--accent);}
    .wallet-btn.active{border-color:var(--success);color:var(--success);background:rgba(34,201,122,.06);}
    .status-box{padding:14px 18px;border-radius:12px;border:1px solid;font-size:13px;margin-bottom:12px;line-height:1.6;}
    .status-info{background:rgba(79,142,247,.08);border-color:rgba(79,142,247,.3);color:#7fb3ff;}
    .status-success{background:rgba(34,201,122,.08);border-color:rgba(34,201,122,.3);color:var(--success);}
    .status-error{background:rgba(255,80,80,.08);border-color:rgba(255,80,80,.3);color:#ff8080;}
    .status-warn{background:rgba(245,166,35,.08);border-color:rgba(245,166,35,.3);color:var(--warn);}
    .step-indicator{display:flex;align-items:center;gap:8px;padding:16px 18px 14px;font-size:12px;color:var(--muted);font-family:var(--mono);}
    .step{display:flex;align-items:center;gap:4px;}
    .step-num{width:20px;height:20px;border-radius:50%;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:10px;}
    .step.done .step-num{border-color:var(--success);color:var(--success);}
    .step.active .step-num{border-color:var(--accent);color:var(--accent);}
    .step.pending .step-num{border-color:var(--muted);}
    .step-line{flex:1;height:1px;background:var(--border);}
    .help{text-align:center;font-size:12px;color:var(--muted);padding:8px 0 4px;line-height:1.7;}
    #main-content{display:none;}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .img-loading{background:linear-gradient(90deg,var(--border) 25%,var(--border2) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo-ring">🐦</div>
    <h1>Puffin Swap</h1>
    <p>One last step — opt in to receive your NFT</p>
  </div>
  <div id="status-box" class="status-box status-info">Loading…</div>
  <div id="main-content">
    <div id="nft-card" class="card">
      <div class="card-header"><span class="card-title">You Are Receiving</span></div>
      <div id="nft-card-body"></div>
    </div>
    <div class="addr-card">
      <div class="addr-label">Your address</div>
      <div class="addr-value" id="addr-display">—</div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Opt In</span></div>
      <div class="step-indicator">
        <div class="step active" id="step-connect"><div class="step-num">1</div><span>Connect</span></div>
        <div class="step-line"></div>
        <div class="step pending" id="step-sign"><div class="step-num">2</div><span>Sign</span></div>
        <div class="step-line"></div>
        <div class="step pending" id="step-done"><div class="step-num">3</div><span>Done</span></div>
      </div>
      <div class="action-section">
        <div class="wallet-row">
          <button class="wallet-btn" id="btn-pera" onclick="connectWallet('pera')">🔵 Pera</button>
          <button class="wallet-btn" id="btn-defly" onclick="connectWallet('defly')">🟢 Defly</button>
        </div>
        <button class="sign-btn" id="sign-btn" disabled onclick="signOptIn()">Connect a wallet first</button>
      </div>
    </div>
    <p class="help">
      This is a zero-amount opt-in transaction.<br>
      It allows our bot to send your Tufted Puffin to you.<br><br>
      After signing, return to Discord and tap<br>
      <strong>✅ I have opted in</strong>
    </p>
  </div>
</div>
<script>
  function resolveConstructor(candidates){for(var i=0;i<candidates.length;i++){var parts=candidates[i].split('.');var obj=window;for(var j=0;j<parts.length;j++){if(obj==null){obj=null;break;}obj=obj[parts[j]];}if(typeof obj==='function')return obj;}return null;}
  var PeraWalletConnect=resolveConstructor(['peraWalletConnect.PeraWalletConnect','PeraWalletConnect']);
  var DeflyWalletConnect=resolveConstructor(['deflyWalletConnect.DeflyWalletConnect','DeflyWalletConnect']);
  if(!PeraWalletConnect||!DeflyWalletConnect){var sb=document.getElementById('status-box');sb.className='status-box status-error';sb.innerHTML='⚠️ Wallet scripts failed to load.<br>Please hard-refresh and try again.';sb.style.display='block';}

  var ALGOD_URL='https://mainnet-api.algonode.cloud';
  var INDEXER_URL='https://mainnet-idx.algonode.cloud';
  var assets=[],userAddress='',activeWallet=null,walletType=null;
  var peraWallet=PeraWalletConnect?new PeraWalletConnect():null;
  var deflyWallet=DeflyWalletConnect?new DeflyWalletConnect():null;

  function showStatus(type,msg){var el=document.getElementById('status-box');el.className='status-box status-'+type;el.innerHTML=msg;el.style.display='block';}
  function setStep(id,state){document.getElementById(id).className='step '+state;}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function fetchNftImage(asaId) {
    var d = { asaId:asaId, step:'start', rawUrl:null, metaUrl:null, imageRaw:null, finalUrl:null, error:null, metaKeys:null };
    try {
        d.step = 'indexer';
        var r1 = await fetch(INDEXER_URL + '/v2/assets/' + asaId);
        if (!r1.ok) { d.error = 'Indexer HTTP ' + r1.status; return d; }
        var j1 = await r1.json();
        d.rawUrl = (j1.asset && j1.asset.params && j1.asset.params.url) || null;
        console.log('[img] rawUrl:', d.rawUrl);
        if (!d.rawUrl) { d.error = 'No url field on ASA'; return d; }

        d.step = 'metadata';
        // Strip fragment AND convert ipfs:// to gateway
        var stripped = d.rawUrl.split('#')[0];
        d.metaUrl = stripped.startsWith('ipfs://')
            ? 'https://ipfs.algonode.dev/ipfs/' + stripped.slice(7)
            : stripped;
        console.log('[img] metaUrl:', d.metaUrl);

        var r2 = await fetch(d.metaUrl);
        if (!r2.ok) { d.error = 'Metadata HTTP ' + r2.status; return d; }
        var meta = await r2.json();
        d.metaKeys = Object.keys(meta).join(', ');
        console.log('[img] meta:', JSON.stringify(meta));

        d.step = 'image field';
        // Handle common variations in metadata structure
        d.imageRaw = meta.image
            || meta.image_url
            || (meta.properties && meta.properties.image)
            || (meta.media && meta.media.image)
            || null;
        console.log('[img] imageRaw:', d.imageRaw);
        if (!d.imageRaw) { d.error = 'No image field. Keys found: ' + d.metaKeys; return d; }

        d.step = 'build url';
        var cid = d.imageRaw.startsWith('ipfs://') ? d.imageRaw.slice(7) : d.imageRaw;
        cid = cid.split('#')[0].split('?')[0];
        d.finalUrl = 'https://ipfs.algonode.dev/ipfs/' + cid + '#i?optimizer=image&width=640';
        console.log('[img] finalUrl:', d.finalUrl);

    } catch(e) {
        d.error = '(' + d.step + ') ' + e.message;
        console.error('[img] exception:', e);
    }
    return d;
}

  async function renderNftCard(assetList){
    var a=assetList[0];
    var body=document.getElementById('nft-card-body');
    body.innerHTML='<div class="single-nft-body"><div class="nft-hero img-loading" id="hero-wrap"><span class="nft-hero-placeholder">🐦</span></div><div class="single-nft-name">'+esc(a.asaName)+'</div><div class="single-nft-asa">ASA '+a.asaId+'</div></div>';

    var result=await fetchNftImage(a.asaId);
    var wrap=document.getElementById('hero-wrap');
    if(!wrap)return;
    wrap.classList.remove('img-loading');

    if(result.finalUrl){
      var img=new Image();
      img.style.cssText='width:100%;height:100%;object-fit:cover;display:none;';
      img.onload=function(){
        var ph=wrap.querySelector('.nft-hero-placeholder');
        if(ph)ph.remove();
        img.style.display='block';
        console.log('[img] loaded OK');
      };
      img.onerror=function(){
        console.error('[img] browser refused to load:',result.finalUrl);
        wrap.innerHTML='<span class="nft-hero-placeholder">🐦</span><div class="debug-box"><strong>⚠️ URL built but browser failed to load image</strong><br><br>URL: <a href="'+esc(result.finalUrl)+'" target="_blank">'+esc(result.finalUrl)+'</a><br><br>Raw ASA url: '+esc(result.rawUrl||'null')+'<br>image field: '+esc(result.imageRaw||'null')+'</div>';
      };
      img.src=result.finalUrl;
      wrap.appendChild(img);
    }else{
      wrap.innerHTML='<span class="nft-hero-placeholder">🐦</span><div class="debug-box"><strong>⚠️ Image resolution failed at step: '+esc(result.step||'?')+'</strong><br><br>Error: '+esc(result.error||'none')+'<br><br>ASA ID: '+esc(String(result.asaId))+'<br>Raw URL: '+esc(result.rawUrl||'null')+'<br>Meta URL: '+esc(result.metaUrl||'null')+'<br>image field: '+esc(result.imageRaw||'null')+(result.metaKeys?'<br>Meta keys: '+esc(result.metaKeys):'')+'</div>';
    }
  }

  async function loadOptIn(){
    var params=new URLSearchParams(window.location.search);
    var gistId=params.get('gist');
    if(!gistId){document.getElementById('status-box').style.display='none';document.getElementById('main-content').innerHTML='<p style="text-align:center;padding:40px;color:var(--muted)">⚠️ Invalid opt-in link.</p>';document.getElementById('main-content').style.display='block';return;}
    try{
      var r=await fetch('https://api.github.com/gists/'+gistId,{headers:{'Accept':'application/vnd.github+json'}});
      if(!r.ok)throw new Error('Opt-in link not found or expired');
      var gist=await r.json();
      var content=gist.files&&gist.files['optin.json']&&gist.files['optin.json'].content;
      if(!content)throw new Error('Opt-in data missing from link');
      var data=JSON.parse(content);
      userAddress=data.addr;
      assets=data.assets&&Array.isArray(data.assets)?data.assets.map(function(a){return{asaId:Number(a.asaId),asaName:a.asaName||'Tufted Puffin'};}): [{asaId:Number(data.asaId),asaName:data.asaName||'Tufted Puffin'}];
      await renderNftCard(assets);
      document.getElementById('addr-display').textContent=userAddress;
      document.getElementById('status-box').style.display='none';
      document.getElementById('main-content').style.display='block';
      if(peraWallet){peraWallet.reconnectSession().then(function(acc){if(acc.length&&acc[0].toLowerCase()===userAddress.toLowerCase()){walletType='pera';activeWallet=peraWallet;document.getElementById('btn-pera').classList.add('active');var s=document.getElementById('sign-btn');s.disabled=false;s.textContent='Sign Opt-In in Pera';setStep('step-connect','done');setStep('step-sign','active');}}).catch(function(){});}
    }catch(e){showStatus('error','⚠️ '+e.message+'.<br><br>Please request a new link from Discord.');}
  }

  async function connectWallet(type){
    if(!peraWallet||!deflyWallet){showStatus('error','⚠️ Wallet scripts did not load.');return;}
    try{
      if(activeWallet&&walletType!==type)await activeWallet.disconnect().catch(function(){});
      walletType=type;activeWallet=type==='pera'?peraWallet:deflyWallet;
      var accounts=await activeWallet.connect();
      if(accounts[0].toLowerCase()!==userAddress.toLowerCase()){showStatus('warn','⚠️ Wrong address connected.<br>Expected: <code>'+userAddress+'</code>');await activeWallet.disconnect().catch(function(){});return;}
      document.getElementById('status-box').style.display='none';
      document.getElementById('btn-'+type).classList.add('active');
      document.getElementById(type==='pera'?'btn-defly':'btn-pera').classList.remove('active');
      var s=document.getElementById('sign-btn');s.disabled=false;s.textContent='Sign Opt-In in '+(type==='pera'?'Pera':'Defly');
      setStep('step-connect','done');setStep('step-sign','active');
    }catch(e){if(e.message&&!e.message.includes('cancelled')&&!e.message.includes('closed'))showStatus('error','Connection failed: '+e.message);}
  }

  async function signOptIn(){
    if(!activeWallet||!assets.length)return;
    var s=document.getElementById('sign-btn');s.disabled=true;s.textContent='⏳ Waiting for wallet approval…';
    document.getElementById('status-box').style.display='none';
    try{
      var client=new algosdk.Algodv2('',ALGOD_URL,443);
      var sp=await client.getTransactionParams().do();
      var txns=assets.map(function(a){return algosdk.makeAssetTransferTxnWithSuggestedParamsFromObject({from:userAddress,to:userAddress,amount:0,assetIndex:a.asaId,suggestedParams:sp});});
      if(txns.length>1)algosdk.assignGroupID(txns);
      var grp=txns.map(function(t){return{txn:t,signers:[userAddress]};});
      setStep('step-sign','active');
      var signed=await activeWallet.signTransaction([grp]);
      s.textContent='⏳ Submitting…';
      var res=await client.sendRawTransaction(signed).do();
      await algosdk.waitForConfirmation(client,res.txId,6);
      setStep('step-sign','done');setStep('step-done','done');
      s.classList.add('success');s.textContent='✅ Opted In — Return to Discord';s.disabled=false;s.onclick=null;
      showStatus('success','✅ Opt-in confirmed!<br><br>Go back to Discord and tap <strong>✅ I have opted in</strong>.');
    }catch(e){
      setStep('step-sign','active');s.disabled=false;s.textContent='Try Again';
      showStatus('error','⚠️ '+(e.message&&e.message.includes('cancelled')?'Signing was cancelled.':e.message||'Unknown error'));
    }
  }

  loadOptIn();
</script>
</body>
</html>
